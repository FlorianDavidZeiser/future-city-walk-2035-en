var SC=[
{id:"smart",t:"Smartcity",sub:"Everything works until it doesn&#39;t.",col:"#38bdf8",glow:"rgba(56,189,248,.07)",
leit:"What breaks when everything runs on one platform?",
dna:["Photovoltaic roofs","Micro data centers","Delivery drones","Modular buildings","Operator dominance","Control center coupling"],
acts:[
{t:"Comfort as Promise",sub:"The Promise",
story:{lbl:"Field Journal · Mara, Quarter Engineer · Monday, 06:12",
txt:"The drone delivers coffee. Right on schedule.\n\nMara&#39;s up on the roof of Block 4, watching the solar panels. Fourteen kilowatts since sunrise—almost exactly what the models predicted. And below her, in the basement, there&#39;s a micro data center just humming away, throwing off enough heat that Block 7 basically warms itself for free. On the street? Shuttles gliding by, silent, punctual. No drivers. No fuss.\n\nShe loves how this works. Energy flows, data flows, goods flow. One system handling it all—maintenance, delivery, security, temperature, everything. And when it works right, you don&#39;t even notice it&#39;s there. Elegant, really.\n\n247 days without a single glitch.\n\nAt 11:03, the drone doesn&#39;t come.\n\nFirst time ever.\n\nMara calls the control center. Busy signal. She pulls up the dashboard. &#39;Connecting…&#39; it says, then nothing.\n\nProbably nothing."},
cards:[
{f:"\u2600\ufe0f",t:"Every roof&#39;s a power plant.\nEvery basement a data center.\nWaste heat warms the next block over."},
{f:"\ud83d\udce6",t:"247 days without a glitch.\nThen a drone doesn&#39;t come.\nControl center&#39;s busy.\nDashboard&#39;s loading."},
{f:"\ud83d\udd17",t:"One platform controls everything:\nMaintenance, delivery, access, temperature.\nOne provider. One system."}],
narr:"Feel that? This city works—until it doesn&#39;t.\nOne platform stutters, the whole quarter goes dark.",
chal:{type:"select",q:"What makes this city work so well—and break so easily?",
opts:[
{t:"A single platform steers energy, logistics, and building access. When it fails, it hits everything at once.",ok:true},
{t:"Modernization moves so fast that residents and systems can&#39;t keep up.",ok:false},
{t:"Individual buildings don&#39;t have analog backup systems.",ok:false},
{t:"Dependence on solar power makes the city vulnerable to weather.",ok:false}],
ok:"Exactly. One platform runs it all—maintenance, delivery, access, heat. Knock that down, the whole quarter falls. Efficiency and risk are twins here.",
no:"Go back to Mara&#39;s journal. Who controls what? How many separate systems? How many platforms running them?"},
jrnl:"Everything runs through one platform. Efficiency and vulnerability are two sides of the same architecture."},
{t:"Who Runs the Quarter?",sub:"City District",
ref:"The drone that didn&#39;t come Monday was just the first symptom. Now Mara sees deeper.",
story:{lbl:"Field Journal · Mara · Tuesday, 14:30",
txt:"Mara opens the operator view and stares at the network topology.\n\nOne corporation runs 60% of the buildings. Everything—maintenance, access, energy routing, security logic. All on their platform. And the other 40%? Three smaller providers that don&#39;t even talk to each other.\n\nThree sensors in West Sector are lagging. Half-second delay. Normally you&#39;d never notice. But she&#39;s been watching now, and yesterday&#39;s drone miss just won&#39;t let go.\n\nShe scrolls back through the incident logs. Back in 2027, there were coordinated infrastructure attacks in three cities. And then what? Everything was consolidated. All the security logic, merged into one system. More efficient. Faster response.\n\nAnd a better target, too... she thinks.\n\nShe wonders who actually understands the whole picture anymore. Not the AIs—they only see data points. Humans? They see their own small piece and call it the system."},
cards:[
{f:"\ud83c\udfe2",t:"One corporation. 60% of buildings.\nOne platform for maintenance,\naccess, energy, security."},
{f:"\ud83d\udd12",t:"2027: attacks. Response: merge everything.\nCameras, sensors, control centers.\nNow one system. One attack vector.",req:"signal"},
{f:"\ud83d\udcca",t:"Modernization races ahead.\nBut only where the big operator invests.\nSmaller providers are falling behind."}],
narr:"One corporation runs 60% of the city. Security and logistics, all in one hand.\nEfficiency looks clean until it isn&#39;t.",
chal:{type:"classify",q:"What pushes this city forward—and what makes the risk worse?",catA:"Drives forward",catB:"Intensifies risk",
items:[{t:"Modular buildings with ongoing repurposing",c:"A"},{t:"Merger of cameras, sensors, and access logic into one system",c:"B"},{t:"Government programs for solar, charging infrastructure, data centers",c:"A"},{t:"One corporation controls 60% of building stock through one platform",c:"B"},{t:"Robotics and AI take on care and logistics tasks",c:"A"}],
ok:"Nailed it. One operator with 60% control and merged security logic—that&#39;s not progress, that&#39;s a time bomb.",
no:"Look at Mara&#39;s notes again. What does she call progress? Where does that 60% and merged security show up?"},
jrnl:"One operator dominates the quarter. Merged security logic cuts costs and creates a central attack surface."},
{t:"Cascade in the Basement",sub:"Building",
ref:"Monday&#39;s drone. Tuesday&#39;s sensors. Now Tuesday evening, a third disruption hits the building itself.",
story:{lbl:"Field Journal · Mara · Tuesday Evening, 19:47",
txt:"Block 4. Basement.\n\nStorage is at 31%. Should be fine—power demand drops at night, panels charge in the morning.\n\nExcept tonight the heat pump&#39;s maxed out because the data center downstairs is working overtime. Forty electric cars charging in the garage at the same time. And the platform that usually orchestrates all this? It&#39;s responding slow. Just like West Sector yesterday.\n\nMara reaches for the manual override.\n\nThen stops.\n\nWhen&#39;s the last time she touched this? When&#39;s the last time anyone had to?\n\nShe can&#39;t remember.\n\nStorage drops to 28%."},
cards:[
{f:"\u26a1",t:"Storage: 31%. Heat pump: full power.\n40 cars charging. Platform&#39;s no longer prioritizing in time."},
{f:"\ud83d\udd27",t:"Manual override switch.\nMara reaches for it.\nThen hesitates.\nWhen did she last operate anything manually?"},
{f:"\ud83c\udf21\ufe0f",t:"Waste heat from Block 4 warms Block 7.\nElegant as long as Block 4 runs.\nIf it fails, Block 7 freezes.",req:"atlas"}],
narr:"Control fails. Loads collide. The power reserve runs dry. And nobody remembers how to do it by hand.\nThree days. Three failures. One cascade.",
chal:{type:"sort",q:"How does a perfectly networked building fall apart? Put the cascade in order.",
items:["Platform responds with delay, prioritization fails","Multiple heavy consumers draw power simultaneously","Storage drops below critical threshold","Manual override fails. The skill is forgotten"],
ok:"Right. Platform fails, loads spike, storage empties, then nobody can fix it by hand. One domino.",
no:"Trace Mara&#39;s evening. What breaks first? What fails last?"},
jrnl:"Cascade: platform fails, loads collide, storage sinks, manual override fails. The error never stays local."}],
recon:{g:[{lbl:"Core Pattern",opts:[{t:"Comfort rests on tight coupling through a central platform.",ok:true},{t:"Decentralized systems work independently and stay stable.",ok:false},{t:"Government steers progress and maintains control.",ok:false}]},{lbl:"Vulnerability",opts:[{t:"Too little digitalization slows progress.",ok:false},{t:"One dominant operator, merged security logic, tight coupling. Any disruption becomes a district-wide problem.",ok:true},{t:"Overregulation prevents efficient solutions.",ok:false}]},{lbl:"Smartest Countermove",opts:[{t:"Even stronger automation eliminates human error.",ok:false},{t:"Complete disconnection from the digital network.",ok:false},{t:"Build in buffers, practice fallback routines, make dependencies transparent.",ok:true}]}],
ok:"Clean read. Mara&#39;s three days show it: tight coupling breeds cascade failures. Smart answer: buffers, fallbacks, real transparency.",
no:"Track Mara&#39;s timeline: Monday, Tuesday, Tuesday night. What connects all three?"},
brief:{sum:"One platform runs everything. Which means when it breaks, everything breaks.",pts:["One platform handles maintenance, delivery, access, temperature. Everything.","Big operators own most buildings. They set the pace.","Security&#39;s merged into one system—cheaper, but one attack brings it all down.","Nobody remembers how to do things the old way anymore."]}},

{id:"silent",t:"When Systems Fell Silent",sub:"What happens when systems fail.",col:"#fb923c",glow:"rgba(251,146,60,.07)",
leit:"What survives when the grid goes down?",
dna:["Power outages","GPS disruptions","Off-grid operation","Task forces","Analog routines","Social inequality"],
acts:[
{t:"The Other Quiet",sub:"The Outage",
story:{lbl:"Night Log · Jara, Control Center Operator · 23:47",
txt:"GPS: offline.\n\nFirst North Sector. Then East. Then everything else.\nScreen 4 dead. Screen 7 dead.\n\nThe 47th outage this quarter. Nothing special anymore. Just Tuesday.\n\nJara reaches for the emergency protocol—paper, not digital. She printed it last week when someone mentioned the power reserve was down to 30%.\n\nEmergency power kicks in. 23% charge. Enough for the night. Barely.\n\nOutside goes silent.\n\nNot the quiet of sleep. The other kind.\n\nThen Block A lights up. Generator humming. Stairwell in Block B smells like soup. Three families, four bowls.\n\nThe machines are dead.\nBut people are still here."},
cards:[{f:"\u26a1",t:"47 outages this quarter. It&#39;s not an anomaly anymore—it&#39;s the baseline."},{f:"\ud83d\udcf1",t:"GPS gone. Navigation gone.\nLogistics gone. Alarm systems without location data.\nEverything depends on GPS."},{f:"\u2753",t:"Emergency power: 23% charge.\nEnough for one night.\nIf nothing else fails."}],
narr:"Power, GPS, screens—all down at once.\nNot an outage. A chain reaction.\nDo you know where the switch is?",
chal:{type:"select",q:"When the central systems go down—what falls apart first?",
opts:[{t:"Power, GPS, and data services collapse at once, dragging everything built on them down with them.",ok:true},{t:"The population refuses to implement emergency measures.",ok:false},{t:"Underinvestment in renewable energy holds the city back.",ok:false},{t:"Individual buildings lose climate control.",ok:false}],
ok:"Exactly. Power, GPS, screens down together. That&#39;s not a failure—that&#39;s a cascade. Everything breaks at once.",
no:"Read Jara&#39;s data: what goes down? Power, GPS, screens—which systems depend on each?"},
jrnl:"It&#39;s not one failure but the chain reaction that matters. Power, GPS, and data collapse together and take everything else with them."},
{t:"Three Blocks, Three Realities",sub:"City District",
ref:"Three days after the outage. 23% emergency power wasn&#39;t enough. Now Jara sees what the crisis does to the quarter.",
story:{lbl:"Field Note · Jara · Day 3 after outage",
txt:"Jara walks the quarter.\n\nBlock A: power&#39;s on. They&#39;ve got their own storage. Their own generator. Their own plan. Residents organized themselves.\n\nBlock B: improvising. Someone dug up an old diesel generator from 2020-something. It works, but nobody knows for how long.\n\nBlock C: just... waiting. No storage. No generator. No protocol. People sitting in the stairwell.\n\nSupermarket milk: 8.40 euros. Was 3.20 last week. Supply chain didn&#39;t break—it just got holes.\n\nResilience, she thinks. Used to be a marketing word. Now it&#39;s the difference between having light and sitting in the dark."},
cards:[{f:"\ud83c\udfe0",t:"Block A has power: own storage, own protocol, organized residents.\nBlock C waits. No plan."},{f:"\ud83d\udcb0",t:"Milk: 8.40 euros. Last week: 3.20.\nThe supply chain&#39;s got holes.\nThose with money buy security.",req:"fallback"},{f:"\ud83e\udda0",t:"Corona 2.0 arrives as the system&#39;s already on its knees.\nNo central crisis coordination this time."}],
narr:"Three blocks, three futures.\nOne&#39;s got its own power. Two don&#39;t.\nResilience isn&#39;t a buzzword. It&#39;s the difference between light and dark.",
chal:{type:"classify",q:"What holds things together in a crisis—and what makes it worse?",catA:"Stabilizes",catB:"Makes worse",
items:[{t:"Local storage and own generators (like Block A)",c:"A"},{t:"Dependence on central platforms with no local fallback",c:"B"},{t:"Analog fallback routines and community organization",c:"A"},{t:"Missing standards between different off-grid solutions",c:"B"},{t:"Improvised short-term fixes without long-term plans (like Block B)",c:"B"}],
ok:"Right. Block A has fallbacks. Blocks B and C don&#39;t. That&#39;s the difference between surviving and drowning.",
no:"Compare the blocks. What does A have that C doesn&#39;t? Why is B better than C but still not enough?"},
jrnl:"Local resilience stabilizes, but without shared standards, going off-grid becomes a patchwork."},
{t:"Manual Operations on Paper",sub:"Building",
ref:"Week 6. The acute crisis has passed. But a plan for next time? Nobody&#39;s got one.",
story:{lbl:"Field Note · Jara · Week 6, Task Force Meeting #23",
txt:"She&#39;s in the coordination center. Or what they use as a coordination center—an old conference room, whiteboards covered in sticky notes.\n\nThe task force has the worst of it stabilized. It took 23 meetings and countless nights.\n\n&#39;We need standards for off-grid operation,&#39; she says.\nOne nod. One person responds: &#39;There&#39;s no time for that now.&#39;\n\nOn her desk: a maintenance log. Handwritten. Why? The documentation system&#39;s been offline for four weeks.\n\nBlock C residents in the stairwell. 23% emergency power that wasn&#39;t enough. She can still picture it.\n\nNext time has to be different, she thinks.\n\nBut who writes the plan when everyone&#39;s fighting today?"},
cards:[{f:"\ud83d\udccb",t:"Maintenance log: handwritten.\nThe documentation system&#39;s been offline for four weeks."},{f:"\ud83d\udd0c",t:"Going off-grid&#39;s working, but each building does it differently.\nNo shared standard. No transferable protocol."},{f:"\ud83e\udd1d",t:"&#39;We need standards.&#39; &#39;There&#39;s no time for that.&#39;\nThat&#39;s exactly the problem."}],
narr:"23 meetings. One handwritten logbook. One question:\nWho plans the next move when today&#39;s falling apart?",
chal:{type:"multi",q:"Next time it all goes down—which two moves would actually help?",n:2,
opts:[{t:"Even stronger connectivity through a central cloud platform.",ok:false},{t:"Standardized off-grid protocols with regularly drilled emergency routines.",ok:true},{t:"Complete return to purely analog systems.",ok:false},{t:"Local storage with minimum capacity and documented fallback logic.",ok:true}],
ok:"Spot on. You need off-grid standards you can actually use and real local storage. That&#39;s resilience.",
no:"Block A versus Block C. What did C actually need? And why doesn&#39;t more connectivity fix a connectivity problem?"},
jrnl:"Crisis resilience comes from practiced fallbacks and shared standards, not more networking or returning to pure analog."}],
recon:{g:[{lbl:"Core Pattern",opts:[{t:"Connected systems become unreliable. Those who can act locally survive the crisis.",ok:true},{t:"Technology is fundamentally unreliable.",ok:false},{t:"Only major state projects stabilize infrastructure.",ok:false}]},{lbl:"Vulnerability",opts:[{t:"Each block improvises alone. Without shared standards, local autonomy becomes a patchwork.",ok:true},{t:"Too much regulation prevents fast crisis response.",ok:false},{t:"The main problem is insufficient digitalization.",ok:false}]},{lbl:"Smartest Countermove",opts:[{t:"Complete return to analog systems.",ok:false},{t:"Standards for off-grid operation, local storage, and regularly practiced emergency routines.",ok:true},{t:"Centralize all systems on a single platform.",ok:false}]}],
ok:"Clear. Digital breaks, local expertise survives—but only if there&#39;s a plan. Standards, storage, practice. That&#39;s the move.",
no:"Follow Jara: the emergency power, the three blocks, the task force. What worked? What didn&#39;t?"},
brief:{sum:"When the center goes dark, neighborhoods survive on their own. But without shared rules, it&#39;s chaos.",pts:["Power, GPS, data—they all go out, and they go out together.","Neighborhoods fend for themselves. But they&#39;re not on the same page.","Planning takes a backseat to getting through today.","Some blocks have light. Others sit in the dark. Inequality shows up fast."]}},

{id:"utopia",t:"Utopia",sub:"A city with everything—except answers.",col:"#4ade80",glow:"rgba(74,222,128,.07)",
leit:"What goes wrong when nothing&#39;s missing?",
dna:["Fusion energy","Energy-positive buildings","Vertical gardens","AI medicine","Longevity","Universal basic income"],
acts:[
{t:"A World Without Scarcity",sub:"Wonder",
story:{lbl:"Journal · Lena, Architect · Morning",
txt:"Outside my window, the city&#39;s buildings are blooming.\n\nWe have strawberries in November and tomatoes in January. Every facade has vertical gardens now—AI systems optimizing every last photon and drop of water, tweaking the nutrients. Beautiful. Alive.\n\nFusion&#39;s been running for three years now. The buildings generate more energy than they use. And at night, the excess power just... glows, soft, on the facades.\n\nType 2 diabetes? Gone. Wiped out since 2033. And cancer—cancer used to mean something real. I actually had to look it up the other day when someone mentioned it. Like reading about something from an old film.\n\nThe air smells like rain and basil. Kids on the roof terrace, nobody rushing. Ground floor, someone&#39;s repairing a violin—not because they have to. Because they want to.\n\nI&#39;m standing here smiling.\n\nThis is what our parents dreamed of."},
cards:[{f:"\u269b\ufe0f",t:"Fusion&#39;s been running three years.\nBuildings put more energy back than they take.\nEnergy? Solved."},{f:"\ud83e\uddec",t:"Cancer—had to look it up.\nType-2 diabetes? Cured since 2033.\nThe big killers are history."},{f:"\ud83c\udf3f",t:"A garden on the roof.\nKids picking strawberries in November.\nThe city smells like life."}],
narr:"Fusion. No disease. Strawberries year-round.\nThis is the world people dreamed of.\nYou live here now.",
chal:{type:"select",q:"What makes this world so good to live in?",
opts:[{t:"Energy, health, and food are solved. For the first time ever, nothing material&#39;s missing.",ok:true},{t:"AI systems are smart enough that humans don&#39;t make mistakes anymore.",ok:false},{t:"Strict regulation keeps everything fair and distributed.",ok:false},{t:"The city&#39;s self-sufficient and doesn&#39;t need anything from outside.",ok:false}],
ok:"Right. Solve energy, health, food—and suddenly everything changes. Not because problems vanish. Because whole new worlds open up.",
no:"What problems does Lena list as solved? What does that unlock?"},
jrnl:"Energy, health, food: solved. For the first time, material scarcity isn&#39;t the wall. This world made good on the promise."},
{t:"Abundance as Task",sub:"City District",
ref:"Lena smiled. Everything&#39;s possible now. Then she gets to the office and notices: not everyone&#39;s smiling.",
story:{lbl:"Journal · Lena · Wednesday",
txt:"I&#39;m at the office, designing a new quarter. With energy-positive buildings, vertical gardens and AI health stations everywhere.\n\nIt&#39;s technically perfect.\n\nBut something about it is just... missing. Something isn&#39;t touching me.\n\nMy colleague&#39;s been talking about universal income. He still works although he doesn&#39;t have to. &#39;I do it because I want to,&#39; he says. &#39;But what about the people who don&#39;t know what they want yet?&#39; &#39;How can they find a purpose in this new world?&#39;\n\nQuantum computers optimizing everything—traffic, energy, health, efficiency. Getting better every day.\n\nYou can&#39;t optimize meaning with an algorithm though.\n\nI look at my design. Perfect energy balance. Perfect layouts.\n\nAnd I can&#39;t draw the answer to what matters."},
cards:[{f:"\ud83c\udf31",t:"Vertical gardens on every wall.\nStrawberries in November.\nAI running everything. Perfectly optimized."},{f:"\ud83d\udcb6",t:"&#39;I work because I want to.&#39; &#39;But what about the ones who don&#39;t know what they want?&#39;",req:"signal"},{f:"\ud83e\uddee",t:"Quantum computers optimize everything:\nTraffic, energy, health.\nEverything except meaning."}],
narr:"You can&#39;t algorithm your way to meaning.\nThat&#39;s not a gap. That&#39;s the work.",
chal:{type:"classify",q:"What does abundance actually solve—and what new problems does it create?",catA:"Solves old problems",catB:"Creates new questions",
items:[{t:"Energy-positive buildings handle demand and send the rest back to the grid",c:"A"},{t:"Work&#39;s optional now. Finding meaning becomes the real challenge",c:"B"},{t:"AI medicine and longevity stretch healthy years further",c:"A"},{t:"Universal income kills wage logic but doesn&#39;t give you daily structure",c:"B"},{t:"Vertical gardens and regenerative systems solve the food question",c:"A"}],
ok:"Exactly. Energy, health, food are handled. Now meaning, rhythm, purpose—those are fresh problems.",
no:"What&#39;s gone? What&#39;s new because it&#39;s gone?"},
jrnl:"Abundance kills the old problems. But meaning, structure, distribution: there&#39;s no operating system for those yet."},
{t:"Space Without Purpose",sub:"Building",
ref:"Lena&#39;s colleague asked: &#39;What about the ones who don&#39;t know what they want?&#39; Now she&#39;s designing the answer.",
story:{lbl:"Journal · Lena · Wednesday Evening",
txt:"An hour later, I&#39;m standing in the atrium of the new community building.\n\nIt not only generates electricity but also filters the air and grows food upstairs. As local as it gets.\n\nApart from all that, I designed the ground floor differently. Different from anything I&#39;ve ever done before.\n\nNo function. No purpose. Just... space.\n\nSpace where people meet. Space where workshops happen. Space where things that don&#39;t have names yet can start.\n\n&#39;When everything&#39;s optimized,&#39; I think, &#39;the unoptimized becomes the luxury.&#39;\n\nI used to design for efficiency.\n\nNow I design for this question: what do people do with time when they don&#39;t have to do anything?\n\nThat&#39;s the harder thing."},
cards:[{f:"\ud83c\udfdb\ufe0f",t:"The ground floor has no function.\nNo purpose. Just space.\nFor things without names."},{f:"\ud83c\udf3f",t:"Used to be: buildings for efficiency.\nNow: buildings for the question of what people do with time.",req:"audit"},{f:"\ud83d\ude80",t:"Space travel&#39;s an option for some now.\nMost stick to dense cities.\nBut what should they look like?"}],
narr:"When everything&#39;s optimized, the messy bits become gold.\nLena stopped building buildings.\nNow she&#39;s building freedom.",
chal:{type:"sort",q:"When scarcity disappears—what changes about how we build?",
items:["Energy efficiency and supply security","Sustainability and regenerative systems","Flexibility for new uses and longer life phases","Spaces for meaning, community, and unnamed activities"],
ok:"Right. From survival to sustainability to flexibility to spaces with zero rules. That&#39;s the shift Lena sees.",
no:"Think layers: what&#39;s needed when there&#39;s nothing? What next when that&#39;s handled? Last, when it&#39;s all there?"},
jrnl:"When everything&#39;s optimized, the unoptimized becomes the luxury. Buildings need space for questions without names."}],
recon:{g:[{lbl:"Core Pattern",opts:[{t:"Abundance solves material problems, but meaning and distribution become new bottlenecks.",ok:true},{t:"Technology automatically solves all social problems.",ok:false},{t:"Energy stays the central bottleneck.",ok:false}]},{lbl:"Vulnerability",opts:[{t:"Energy shortage threatens the city.",ok:false},{t:"When scarcity stops driving things, the structures for meaning, rhythm, and cohesion fall away.",ok:true},{t:"Too much innovation overwhelms people.",ok:false}]},{lbl:"Smartest Countermove",opts:[{t:"Design buildings and quarters for longer life phases, new activities, and open community spaces.",ok:true},{t:"Create artificial scarcity to keep people motivated.",ok:false},{t:"Force maximum efficiency everywhere.",ok:false}]}],
ok:"Utopia decoded: solve survival, then meaning becomes the real work. Buildings have to change to match it.",
no:"Trace Lena: the morning question, the afternoon conversation, the ground floor. What runs through all three?"},
brief:{sum:"Fusion and AI solve the big problems. What&#39;s left? The soft stuff: meaning, fairness, how to spend your time.",pts:["Fusion energy flips the whole system. Buildings create more power than they use.","AI medicine changes everything. People live longer, move through life differently.","Work&#39;s optional. New ways to make money and find meaning.","Buildings need room for activities we don&#39;t have names for yet."]}},

{id:"raster",t:"City in the Grid",sub:"Order and safety. The price tag.",col:"#f87171",glow:"rgba(248,113,113,.07)",
leit:"Where&#39;s the line between order and oppression?",
dna:["Capped consumption","Digital product passports","Recycling quotas","Material bans (PFAS)","Surveillance","Sanctions"],
acts:[
{t:"Everything in Frame",sub:"The Order",
story:{lbl:"Inspection Report · Kai, Building Inspector · Control District 9 · 07:00",
txt:"7 AM. Inspection report open.\n\nDaily quota: 3 kilowatt-hours per person. Nothing over.\nRecycling: certified.\nCO2 balance Block 12: within bounds.\n\nKai likes the clarity. Rules are rules. No gray. No guessing. The city works because the rules work.\n\nPFAS-free. RoHS-compliant. REACH-certified. Every material logged. Every stream tracked. Since the bans, cancer rates dropped 40%. Air&#39;s clean. Water&#39;s clean.\n\nDrones scan. Cameras watch. Everything correct. Everything in the grid.\n\nTwo years ago, someone built a balcony without permission.\nHe doesn&#39;t live here anymore."},
cards:[{f:"\ud83d\udccf",t:"Daily quota: 3.00 kWh.\nGo over? Automatic fine.\nNo warning."},{f:"\ud83d\udcf8",t:"17 cameras on the way to the bakery.\nCrime&#39;s at a historic low.\nMood&#39;s pretty low too."},{f:"\ud83e\udea3",t:"PFAS-free. RoHS-compliant. REACH-certified.\nNo cert? No market.\nThat&#39;s the deal."}],
narr:"Safe. Ordered. Controlled.\nThat part works. But would you actually live here?",
chal:{type:"select",q:"What&#39;s the logic that holds this city together?",
opts:[{t:"Technological progress and innovation as the goal.",ok:false},{t:"Citizens voted for more security and it happened.",ok:false},{t:"Resources are running out. Politics demanded control, not innovation.",ok:true},{t:"Economic growth needs strict rules to work.",ok:false}],
ok:"Spot on. It&#39;s not innovation. It&#39;s pressure. Earth Overshoot Day keeps coming earlier. The answer? Control. Caps. Bans. Fines.",
no:"Look at Kai&#39;s data. What actually caused this? Watch for Earth Overshoot Day and the political choice."},
jrnl:"The grid didn&#39;t come from progress. It came from pressure. Scarcity forced control instead of innovation."},
{t:"Proof of Compliance",sub:"City District",
ref:"The man who built a balcony. 17 cameras on the way to the bakery. Kai watches daily what control actually looks like. Now he audits how it works inside buildings.",
story:{lbl:"Field Note · Kai · Wednesday, 10:15",
txt:"Kai inspecting Building 7&#39;s product passport.\n\nEvery material logged. Raw material through processing to installation. PFAS-free. RoHS-compliant. REACH-certified.\n\nYou don&#39;t document, you don&#39;t sell. That&#39;s the rule.\n\nWalking to the next building, he counts cameras. 17 on the way to the bakery. Crime&#39;s at a 20-year low. People&#39;s mood is too.\n\nAt the quarter entrance, the sign reads: &#39;Safe and Clean.&#39;\nSomeone wrote underneath: &#39;And Quiet.&#39;"},
cards:[{f:"\ud83d\udcdd",t:"Every material. Every part.\nFully documented.\nFrom raw material to disposal.",req:"atlas"},{f:"\ud83c\udf0d",t:"Earth Overshoot Day keeps getting earlier.\nPolitics&#39; answer? Regulation.\nNot incentives. Not innovation.\nControl."},{f:"\u270d\ufe0f",t:"The sign says &#39;Safe and Clean.&#39;\nSomeone wrote &#39;And Quiet.&#39; underneath."}],
narr:"Everything&#39;s tracked. Nowhere left to move.\nSafe. Clean. Silent.\nWhere does it cross the line?",

var SND=(function(){
var ctx=null,mG=null,aG=null,uG=null,on=false,ready=false,curAmb=null,curId='';
function init(){try{var AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;ctx=new AC();mG=ctx.createGain();mG.gain.value=1;mG.connect(ctx.destination);aG=ctx.createGain();aG.gain.value=0.07;aG.connect(mG);uG=ctx.createGain();uG.gain.value=0.15;uG.connect(mG);ready=true;}catch(e){}}
function resume(){if(ctx&&ctx.state==='suspended')ctx.resume();}
function toggle(){on=!on;localStorage.setItem(SOUND_KEY,on?'1':'0');updBtn();if(on){if(!ready)init();resume();if(curId)amb(curId);}else stopAmb();}
function updBtn(){var b=document.getElementById('sndb');if(b)b.textContent=on?'\ud83d\udd0a':'\ud83d\udd07';}
function loadPref(){on=true;if(!localStorage.getItem(SOUND_KEY))localStorage.setItem(SOUND_KEY,'1');}
function stopAmb(){if(curAmb){try{curAmb.forEach(function(n){try{n.stop();}catch(e){}});}catch(e){}curAmb=null;}}
function amb(id){curId=id;/* V13: ambient drones removed, UI sounds only */}
function ui(type){if(!on||!ready||!ctx)return;resume();try{var t=ctx.currentTime;
if(type==='flip'){var o=ctx.createOscillator();o.type='triangle';o.frequency.value=680;o.frequency.exponentialRampToValueAtTime(920,t+0.08);var g=ctx.createGain();g.gain.value=0.09;g.gain.setTargetAtTime(0,t+0.06,0.025);o.connect(g);g.connect(uG);o.start();o.stop(t+0.14);}
else if(type==='ok'){var o1=ctx.createOscillator();o1.type='triangle';o1.frequency.value=523;var o2=ctx.createOscillator();o2.type='triangle';o2.frequency.value=659;var o3=ctx.createOscillator();o3.type='triangle';o3.frequency.value=784;var g=ctx.createGain();g.gain.value=0.10;g.gain.setTargetAtTime(0,t+0.35,0.1);o1.connect(g);o2.connect(g);o3.connect(g);g.connect(uG);o1.start();o2.start(t+0.08);o3.start(t+0.16);o1.stop(t+0.45);o2.stop(t+0.45);o3.stop(t+0.45);}
else if(type==='no'){var o1=ctx.createOscillator();o1.type='triangle';o1.frequency.value=370;var o2=ctx.createOscillator();o2.type='triangle';o2.frequency.value=310;var g=ctx.createGain();g.gain.value=0.08;g.gain.setTargetAtTime(0,t+0.25,0.06);o1.connect(g);o2.connect(g);g.connect(uG);o1.start();o1.stop(t+0.15);o2.start(t+0.12);o2.stop(t+0.3);}
else if(type==='click'){var o=ctx.createOscillator();o.type='triangle';o.frequency.value=900;var g=ctx.createGain();g.gain.value=0.05;g.gain.setTargetAtTime(0,t+0.025,0.01);o.connect(g);g.connect(uG);o.start();o.stop(t+0.06);}
else if(type==='whoosh'){var o=ctx.createOscillator();o.type='triangle';o.frequency.value=350;o.frequency.exponentialRampToValueAtTime(120,t+0.2);var lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=500;lp.Q.value=0.7;var g=ctx.createGain();g.gain.value=0.06;g.gain.setTargetAtTime(0,t+0.15,0.04);o.connect(lp);lp.connect(g);g.connect(uG);o.start();o.stop(t+0.25);}
}catch(e){}}
return{toggle:toggle,loadPref:loadPref,amb:amb,stopAmb:stopAmb,ui:ui,resume:resume,updBtn:updBtn};
})();

function selSc(i){if(i>=S.ul)return;S.sc=i;rT();sv();SND.ui('click');go('case');}
function stAct(ai){if(ai>0&&!isDone(S.sc,ai-1))return;if(isDone(S.sc,ai))return;S.act=ai;rT();sv();SND.ui('click');go(FLOW[cs().id][ai][0]);}
function flipBtnDelay(col,label){setTimeout(function(){var cb=document.getElementById('clueBtn');if(cb){cb.innerHTML='<button class="btn bp" style="background:linear-gradient(135deg,'+col+','+col+'cc)" onclick="nextFlow()">'+label+'</button>';cb.style.opacity='1';}},2500);}
function flip(i){var cd=ca().cards[i];if(isGated(cd)||T.fl.indexOf(i)>=0)return;T.fl.push(i);SND.ui('flip');var el=document.getElementById('c'+i);if(el)el.classList.add('rev');var need=flipCount();if(T.fl.length>=need){setTimeout(function(){var ac=document.getElementById('ac');if(ac){var a=ca(),sc=cs();var nextLabel=(cs().id==='silent'&&S.act===0)?'To the night log \u2192':'Continue \u2192';ac.innerHTML='<div class="narr an">'+nl(a.narr)+'</div><div class="center mt1 an" id="clueBtn" style="opacity:0;transition:opacity .6s"></div>';flipBtnDelay(sc.col,nextLabel);}},700);}}
function goChal(){T.w=false;T.wc=0;T.sel=-1;T.so=[];T.ss=[];T.cl={};T.ml=[];go('chal');}
function goRecon(){T.rc=[null,null,null];T.w=false;go('recon');}
function pick(i){T.sel=i;SND.ui('click');document.querySelectorAll('.opt').forEach(function(el,j){el.classList.toggle('sel',j===i);});}
function mpick(i){var idx=T.ml.indexOf(i);if(idx>=0)T.ml.splice(idx,1);else T.ml.push(i);SND.ui('click');document.querySelectorAll('.opt').forEach(function(el,j){el.classList.toggle('sel',T.ml.indexOf(j)>=0);});}
function srt(di){var orig=T.ss[di],pos=T.so.indexOf(orig);if(pos>=0)T.so=T.so.slice(0,pos);else T.so.push(orig);SND.ui('click');T.ss.forEach(function(o,d){var p=T.so.indexOf(o),b=document.getElementById('sb'+d),s=document.getElementById('si'+d);if(b)b.textContent=p>=0?(p+1):'\u2014';if(s)s.classList.toggle('num',p>=0);});}
function cat(i,v){T.cl[i]=T.cl[i]===v?undefined:v;SND.ui('click');var a=document.querySelector('#ci'+i+' .cbn:first-child'),b=document.querySelector('#ci'+i+' .cbn:last-child');if(a)a.classList.toggle('aa',T.cl[i]==='A');if(b)b.classList.toggle('ab',T.cl[i]==='B');}
function rpick(gi,oi){T.rc[gi]=oi;SND.ui('click');document.querySelectorAll('.rg').forEach(function(rg,g){rg.querySelectorAll('.ro').forEach(function(ro,o){ro.classList.toggle('sel',T.rc[g]===o);});});}
function sub(){var cl=ca().chal,ok=false;if(cl.type==='select'){if(T.sel<0)return;ok=cl.opts[T.sel].ok;}else if(cl.type==='sort'){if(T.so.length!==cl.items.length)return;ok=T.so.every(function(v,i){return v===i;});}else if(cl.type==='classify'){if(!cl.items.every(function(_,i){return T.cl[i];}))return;ok=cl.items.every(function(it,i){return T.cl[i]===it.c;});}else if(cl.type==='multi'){if(T.ml.length!==cl.n)return;ok=T.ml.every(function(i){return cl.opts[i].ok;})&&T.ml.length===cl.opts.filter(function(o){return o.ok;}).length;}if(ok){SND.ui('ok');if(T.wc===0)S.ftc=(S.ftc||0)+1;S.da[ak(S.sc,S.act)]=true;var a=ca();S.jr.push(cs().t+' \u00b7 '+a.sub+': '+a.jrnl);if([0,1,2].every(function(ai){return isDone(S.sc,ai);})&&S.sc+1<SC.length)S.ul=Math.max(S.ul,S.sc+2);sv();var app=document.getElementById('app');if(app){app.classList.add('anim-glow');setTimeout(function(){app.classList.remove('anim-glow');go('result');},700);}else{go('result');}}else{SND.ui('no');T.w=true;T.wc++;var app=document.getElementById('app');if(app){app.classList.add('anim-shake');setTimeout(function(){app.classList.remove('anim-shake');go('chal');},500);}else{go('chal');}}}
function subR(){if(T.rc.some(function(v){return v===null;}))return;var ok=cs().recon.g.every(function(g,gi){return g.opts[T.rc[gi]].ok;});SND.ui(ok?'ok':'no');S.ds[S.sc]=true;S.da[ak(S.sc,S.act)]=true;var a=ca();if(a.jrnl)S.jr.push(cs().t+' \u00b7 '+a.sub+': '+a.jrnl);if([0,1,2].every(function(ai){return isDone(S.sc,ai);})&&S.sc+1<SC.length)S.ul=Math.max(S.ul,S.sc+2);sv();if(!ok){T.reconFb=true;go('recon');}else{go('reflex');}}
function buy(i){return;}
function nxt(){SC.every(function(_,i){return isSD(i);})?go('outro'):go('map');}
function rst(){if(!confirm('Really reset progress?'))return;localStorage.removeItem(SK);S=JSON.parse(JSON.stringify(DF));rT();go('pro');}

/* === INIT === */
ld();rT();SND.loadPref();
document.addEventListener('click',function(){SND.resume();},{once:true});
document.addEventListener('touchstart',function(){SND.resume();},{once:true});
var g=document.getElementById('gl');g.style.background='radial-gradient(ellipse at 50% 0%,rgba(245,158,11,.05),transparent 60%)';
var initScr=S.scr==='pro'?'pro':'map';S.scr=initScr;
document.getElementById('app').innerHTML='<div class="an">'+R(initScr)+'</div>';
if(initScr==='story')setTimeout(storyStart,400);
SND.updBtn();
</script>
</body>
